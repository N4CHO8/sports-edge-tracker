<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sports Edge Tracker</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">UFC · Futbol · Basquetbol</p>
        <h1>Sports Edge Tracker</h1>
      </div>
      <button id="refreshButton" class="primary-button" type="button">
        <span class="button-icon" aria-hidden="true">↻</span>
        Actualizar datos
      </button>
    </header>

    <main>
      <section class="status-strip" aria-live="polite">
        <div>
          <span class="label">Estado</span>
          <strong id="statusText">Listo para actualizar</strong>
        </div>
        <div>
          <span class="label">Ultima captura</span>
          <strong id="lastUpdated">Sin datos</strong>
        </div>
        <div>
          <span class="label">Modo</span>
          <strong id="modeText">Detectando</strong>
        </div>
      </section>

      <section class="metrics-grid">
        <article>
          <span class="metric-label">Eventos</span>
          <strong id="eventsCount">0</strong>
        </article>
        <article>
          <span class="metric-label">Snapshots de cuotas</span>
          <strong id="oddsCount">0</strong>
        </article>
        <article>
          <span class="metric-label">Mejor senal</span>
          <strong id="bestSignal">-</strong>
        </article>
      </section>

      <section class="controls">
        <div class="tabs" role="tablist" aria-label="Filtro de deporte">
          <button class="tab active" data-sport="all" type="button">Todos</button>
          <button class="tab" data-sport="ufc" type="button">UFC</button>
          <button class="tab" data-sport="football" type="button">Futbol</button>
          <button class="tab" data-sport="basketball" type="button">Basquetbol</button>
        </div>
        <label class="search-box">
          <span>Buscar</span>
          <input id="searchInput" type="search" placeholder="Equipo, peleador o liga" />
        </label>
      </section>

      <section class="table-wrap" aria-label="Eventos deportivos">
        <table>
          <thead>
            <tr>
              <th>Deporte</th>
              <th>Evento</th>
              <th>Inicio</th>
              <th>Mercado</th>
              <th>Mejor cuota</th>
              <th>Prob. implicita</th>
              <th>Senal</th>
            </tr>
          </thead>
          <tbody id="eventsBody"></tbody>
        </table>
        <div id="emptyState" class="empty-state">
          Presiona Actualizar datos para cargar la primera captura.
        </div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
